spring:
  application:
    name: taller-zapata-backend
  profiles:
    active: local
  jackson:
    time-zone: America/Argentina/Buenos_Aires
    serialization:
      write-dates-as-timestamps: false
  datasource:
    url: jdbc:mysql://localhost:3306/taller_zapata?createDatabaseIfNotExist=true&useSSL=false&serverTimezone=America/Argentina/Buenos_Aires
    username: root
    password: root
    driver-class-name: com.mysql.cj.jdbc.Driver
  jpa:
    hibernate:
      ddl-auto: validate
    open-in-view: false
    properties:
      hibernate:
        format_sql: true
  flyway:
    enabled: true
    locations: classpath:db/migration

server:
  servlet:
    context-path: /

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      show-details: always
  info:
    env:
      enabled: true

springdoc:
  swagger-ui:
    path: /swagger-ui.html

info:
  app:
    name: Taller Zapata Backend
    description: Bootstrap inicial del backend alineado al modelo vigente
    version: v1

logging:
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level [%X{traceId}] %logger{36} - %msg%n"

app:
  api:
    version: v1
    base-path: /api/v1
  security:
    auth-strategy: jwt-refresh-token
    jwt-secret: change-this-secret-in-real-environments-change-this-secret-in-real-environments
    access-token-seconds: 900
    refresh-token-days: 15
  storage:
    mode: local
    local-path: ./var/storage
  observability:
    correlation-header: X-Trace-Id
