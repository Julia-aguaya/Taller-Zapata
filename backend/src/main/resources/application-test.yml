spring:
  datasource:
    url: jdbc:h2:mem:taller_zapata_test;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:
  jpa:
    hibernate:
      ddl-auto: create-drop
    defer-datasource-initialization: true
  sql:
    init:
      mode: always
  flyway:
    enabled: false

app:
  storage:
    mode: local
    local-path: ./target/test-storage

logging:
  level:
    root: WARN
